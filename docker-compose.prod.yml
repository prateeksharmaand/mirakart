# Production overrides. Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Differences from the base (dev/staging) file:
# - No host port bindings for internal services (Postgres/Redis/MinIO stay
#   reachable only from the mirakart-net bridge network, not the VPS host).
# - Restart policy hardened; logs capped to bound disk usage.
# - Certbot renewal sidecar runs alongside nginx.

services:
  postgres:
    ports: []
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    ports: []
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  minio:
    ports: []
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  web:
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  admin:
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  merchant:
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done"
    networks: [mirakart-net]
