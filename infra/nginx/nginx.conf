user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /var/log/nginx/access.log main;

  sendfile   on;
  tcp_nopush on;
  keepalive_timeout 65;

  gzip on;
  gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  client_max_body_size 25m;

  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

  # Docker embedded DNS — resolves container names at request time
  resolver 127.0.0.11 valid=30s;

  upstream web_upstream      { server web:4000; }
  upstream admin_upstream    { server admin:4000; }
  upstream merchant_upstream { server merchant:4000; }
  upstream api_upstream      { server api:4000; }

  # ── HTTP → HTTPS redirect ──────────────────────────────────────
  server {
    listen 80;
    server_name astrovaak.online www.astrovaak.online
                admin.astrovaak.online
                seller.astrovaak.online
                api.astrovaak.online;

    # Certbot ACME HTTP-01 challenge
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── Shared SSL params (wildcard cert) ─────────────────────────
  ssl_certificate     /etc/letsencrypt/live/astrovaak.online/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/astrovaak.online/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 10m;

  # ── astrovaak.online — customer storefront ─────────────────────
  server {
    listen 443 ssl;
    server_name astrovaak.online www.astrovaak.online;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    location / {
      set $upstream http://web_upstream;
      proxy_pass $upstream;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        "upgrade";
      proxy_connect_timeout 60s;
      proxy_send_timeout    60s;
      proxy_read_timeout    60s;
    }
  }

  # ── admin.astrovaak.online — admin portal ─────────────────────
  server {
    listen 443 ssl;
    server_name admin.astrovaak.online;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    location / {
      set $upstream http://admin_upstream;
      proxy_pass $upstream;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        "upgrade";
      proxy_connect_timeout 60s;
      proxy_send_timeout    60s;
      proxy_read_timeout    60s;
    }
  }

  # ── seller.astrovaak.online — merchant portal ─────────────────
  server {
    listen 443 ssl;
    server_name seller.astrovaak.online;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    location / {
      set $upstream http://merchant_upstream;
      proxy_pass $upstream;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        "upgrade";
      proxy_connect_timeout 60s;
      proxy_send_timeout    60s;
      proxy_read_timeout    60s;
    }
  }

  # ── api.astrovaak.online — NestJS API ─────────────────────────
  server {
    listen 443 ssl;
    server_name api.astrovaak.online;
    client_max_body_size 25m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    location /api/health {
      proxy_pass http://api_upstream;
      access_log off;
    }

    # MinIO public storage — strips /storage prefix and proxies to MinIO
    location /storage/ {
      proxy_pass         http://minio:9000/;
      proxy_http_version 1.1;
      proxy_set_header   Host              minio:9000;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      # Cache public images aggressively at the CDN / browser layer
      add_header         Cache-Control "public, max-age=31536000, immutable" always;
      add_header         Access-Control-Allow-Origin "*" always;

      proxy_connect_timeout 30s;
      proxy_send_timeout    60s;
      proxy_read_timeout    60s;
    }

    location / {
      limit_req zone=api_limit burst=40 nodelay;
      set $upstream http://api_upstream;
      proxy_pass $upstream;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 60s;
      proxy_send_timeout    60s;
      proxy_read_timeout    60s;
    }
  }
}
