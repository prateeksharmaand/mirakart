name: mirakart

networks:
  mirakart-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:
  certbot-www:
  certbot-conf:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mirakart}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-mirakart}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mirakart}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [mirakart-net]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [mirakart-net]

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [mirakart-net]

  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb -p local/product-images local/merchant-documents local/return-images local/store-assets local/banners &&
      mc anonymous set download local/product-images &&
      mc anonymous set download local/store-assets &&
      mc anonymous set download local/banners
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks: [mirakart-net]

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mirakart}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mirakart}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health/ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [mirakart-net]

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_MINIO_HOST: ${NEXT_PUBLIC_MINIO_HOST}
        NEXT_PUBLIC_MINIO_USE_SSL: ${NEXT_PUBLIC_MINIO_USE_SSL}
    restart: unless-stopped
    env_file: .env
    depends_on:
      api:
        condition: service_healthy
    networks: [mirakart-net]

  admin:
    build:
      context: .
      dockerfile: infra/docker/admin.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_MINIO_HOST: ${NEXT_PUBLIC_MINIO_HOST}
        NEXT_PUBLIC_MINIO_USE_SSL: ${NEXT_PUBLIC_MINIO_USE_SSL}
    restart: unless-stopped
    env_file: .env
    depends_on:
      api:
        condition: service_healthy
    networks: [mirakart-net]

  merchant:
    build:
      context: .
      dockerfile: infra/docker/merchant.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_MINIO_HOST: ${NEXT_PUBLIC_MINIO_HOST}
        NEXT_PUBLIC_MINIO_USE_SSL: ${NEXT_PUBLIC_MINIO_USE_SSL}
    restart: unless-stopped
    env_file: .env
    depends_on:
      api:
        condition: service_healthy
    networks: [mirakart-net]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/templates:/etc/nginx/templates:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-conf:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
      - admin
      - merchant
      - api
    networks: [mirakart-net]
